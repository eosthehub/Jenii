<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

/* Tela de carregamento */
#loader{
    position:fixed;
    inset:0;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner{
    width:60px;
    height:60px;
    border:5px solid rgba(255,255,255,.2);
    border-top:5px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

/* Barra de navegação */
nav{
    width:100%;
    background:#111827;
    padding:15px;
    position:sticky;
    top:0;
}

nav ul{
    display:flex;
    justify-content:center;
    gap:25px;
    list-style:none;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* Conteúdo */
main{
    min-height:calc(100vh - 120px);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    font-size:clamp(2rem,5vw,4rem);
}

/* Rodapé */
footer{
    background:#111827;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px;">Carregando...</p>
</div>

<nav>
    <ul>
        <li><a href="#">Início</a></li>
        <li><a href="#">Projetos</a></li>
  
    </ul>
</nav>

<main>
    <h1>Bem-vindo ao Site EOS</h1>
</main>

<footer>
    Criado por EOS
</footer>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1500);
};
</script>

</body>
</html>
